<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/static/css/styles.css}" />
  </head>
  <body>
    <div class="container">
      <h1>Your Dashboard</h1>
      <div class="controls">
        <a th:href="@{/create}" class="btn">Create Game</a>
        <a th:href="@{/join}" class="btn">Join Game</a>
        <a th:href="@{/auth/logout}" class="btn">Logout</a>
      </div>
      <section id="past-games">
        <h2>Past Games</h2>
        <div class="grid">No games yet</div>
      </section>
    </div>
  </body>
</html>
