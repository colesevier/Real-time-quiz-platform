<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lobby</title>
    <link rel="stylesheet" th:href="@{/css/game.css}" />
  </head>
  <body>
    <div class="container">

      <!-- Waiting Hero -->
      <div class="waiting-hero">
        <div class="waiting-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
          </svg>
        </div>
        <h1>Waiting for host to start&hellip;</h1>
        <div class="meta">
          You're <strong th:text="${nickname}">player</strong>
          &nbsp;·&nbsp;
          Game code: <strong class="code" th:text="${code}" style="font-size:1em; padding:2px 10px;">------</strong>
        </div>
        <p class="hint" style="margin-top:8px">Status: <span id="status">connecting</span></p>
      </div>

      <!-- Roster -->
      <div class="card">
        <div class="roster-header">
          <h2>Players in Lobby</h2>
          <span class="player-count-badge" id="roster-badge">0 joined</span>
        </div>
        <ul id="roster" class="roster">
          <li class="empty">No one yet</li>
        </ul>
      </div>

      <!-- Live Game Panel -->
      <section id="game-panel" class="game-panel hidden">
        <div class="game-header">
          <div>
            <h2 id="game-status">Live Game</h2>
            <p class="hint" id="question-count">Waiting for the first question</p>
          </div>
          <div class="timer" id="timer">--</div>
        </div>

        <div id="question-panel" class="question-panel hidden">
          <h3 id="question-prompt"></h3>
          <div id="choice-list" class="choice-list"></div>
          <p id="answer-feedback" class="answer-feedback"></p>
        </div>

        <div id="leaderboard-panel" class="leaderboard-panel hidden">
          <h2>Leaderboard</h2>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
        </div>

        <div id="final-panel" class="final-panel hidden">
          <div class="final-title" style="display:none"></div>
          <h2>Final Podium</h2>
          <div id="podium" class="podium"></div>
          <p id="session-summary" class="hint"></p>
          <div class="controls" style="margin-top:20px">
            <a class="btn" th:href="@{/dashboard}">← Leave Game</a>
          </div>
        </div>
      </section>

      <div id="log" class="log"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script th:inline="javascript">
      window.LOBBY_CODE = /*[[${code}]]*/ '';
      window.LOBBY_ROLE = 'player';
      window.LOBBY_NICKNAME = /*[[${nickname}]]*/ '';
    </script>
    <script th:src="@{/js/game.js}"></script>
    <script th:src="@{/js/lobby.js}"></script>
    <script>
      // Keep roster badge in sync
      const obs = new MutationObserver(() => {
        const count = document.querySelectorAll('#roster li:not(.empty)').length;
        const badge = document.getElementById('roster-badge');
        if (badge) badge.textContent = count + ' joined';
      });
      obs.observe(document.getElementById('roster'), { childList: true });
    </script>
  </body>
</html>
