<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <title>Join Game</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
    <div class="container">
      <h1>Join Game</h1>
      <div th:if="${error}" class="error" th:text="${error}"></div>
      <form method="post" action="/join">
        <label>Code:
          <input type="text" name="code" th:value="${code}" maxlength="12" required autofocus />
        </label><br/>
        <label>Nickname:
          <input type="text" name="nickname" th:value="${nickname}" maxlength="24" required />
        </label><br/>
        <button type="submit" class="btn">Join</button>
      </form>
      <p><a th:href="@{/dashboard}">Back to dashboard</a></p>
    </div>
  </body>
</html>
