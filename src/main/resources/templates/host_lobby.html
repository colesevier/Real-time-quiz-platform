<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <title>Host Lobby</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
    <div class="container">
      <h1>Hosting: <span th:text="${gameTitle}">Game Title</span></h1>
      <p>
        Invite code: <strong class="code" th:text="${code}" id="code">------</strong>
        &middot;
        Invite link:
        <a id="invite-link" th:href="'/join?code=' + ${code}" th:text="'/join?code=' + ${code}">/join?code=...</a>
      </p>
      <p>
        Status: <span id="status" th:text="${status}">LOBBY</span>
        &middot;
        Players: <span id="player-count">0</span> / <span th:text="${maxPlayers}">50</span>
      </p>

      <h2>Players</h2>
      <ul id="roster" class="roster"><li class="empty">Waiting for players...</li></ul>

      <div class="controls">
        <button type="button" class="btn" id="start-btn" disabled>Start Game</button>
        <button type="button" class="btn hidden" id="next-question-btn" disabled>Next Question</button>
        <button type="button" class="btn btn-warn hidden" id="finish-game-btn">Finish Game</button>
        <form method="post" th:action="@{'/host/' + ${code} + '/cancel'}" style="display:inline">
          <button type="submit" class="btn btn-warn">Cancel Game</button>
        </form>
      </div>

      <section id="game-panel" class="game-panel hidden">
        <div class="game-header">
          <div>
            <h2 id="game-status">Live Game</h2>
            <p class="hint" id="question-count">Waiting for the first question</p>
          </div>
          <div class="timer" id="timer">--</div>
        </div>

        <div id="question-panel" class="question-panel hidden">
          <h3 id="question-prompt"></h3>
          <div id="choice-list" class="choice-list host-choices"></div>
        </div>

        <div id="leaderboard-panel" class="leaderboard-panel hidden">
          <h2>Leaderboard</h2>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
        </div>

        <div id="final-panel" class="final-panel hidden">
          <div class="final-title" style="display:none"></div>
          <h2>Final Podium</h2>
          <div id="podium" class="podium"></div>
          <p id="session-summary" class="hint"></p>
          <button type="button" class="btn" id="export-results-btn">Export Results CSV</button>
          <p><a class="btn" th:href="@{/dashboard}">Return to Dashboard</a></p>
        </div>
      </section>

      <div id="log" class="log"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script th:inline="javascript">
      window.LOBBY_CODE = /*[[${code}]]*/ '';
      window.LOBBY_ROLE = 'host';
    </script>
    <script th:src="@{/js/game.js}"></script>
    <script th:src="@{/js/lobby.js}"></script>
  </body>
</html>
