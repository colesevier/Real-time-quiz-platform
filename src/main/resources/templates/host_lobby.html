<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Host Lobby</title>
    <link rel="stylesheet" th:href="@{/css/game.css}" />
  </head>
  <body>
    <div class="container">

      <!-- Page Title -->
      <h1>Hosting: <span th:text="${gameTitle}">Game Title</span></h1>

      <!-- Invite Bar -->
      <div class="invite-bar">
        <div>
          <div class="label">Game Code</div>
          <span class="code" id="code" th:text="${code}">------</span>
        </div>
        <div class="invite-link-wrap">
          <div class="label">Invite Link</div>
          <a id="invite-link" th:href="'/join?code=' + ${code}" th:text="'/join?code=' + ${code}">/join?code=...</a>
        </div>
      </div>

      <!-- Status Row -->
      <div class="status-row">
        <span class="pill">
          <span class="pill-dot"></span>
          Status: <strong id="status" th:text="${status}">LOBBY</strong>
        </span>
        <span class="pill">
          Players: <strong><span id="player-count">0</span> / <span th:text="${maxPlayers}">50</span></strong>
        </span>
      </div>

      <!-- Player Roster -->
      <div class="card">
        <div class="roster-header">
          <h2>Players in Lobby</h2>
          <span class="player-count-badge" id="roster-badge">0 joined</span>
        </div>
        <ul id="roster" class="roster">
          <li class="empty">Waiting for players to join...</li>
        </ul>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button type="button" class="btn" id="start-btn" disabled>▶ Start Game</button>
        <button type="button" class="btn hidden" id="next-question-btn" disabled>Next Question</button>
        <button type="button" class="btn btn-warn hidden" id="finish-game-btn">Finish Game</button>
        <form method="post" th:action="@{'/host/' + ${code} + '/cancel'}" style="display:inline">
          <button type="submit" class="btn btn-warn">✕ Cancel Game</button>
        </form>
      </div>

      <!-- Live Game Panel -->
      <section id="game-panel" class="game-panel hidden">
        <div class="game-header">
          <div>
            <h2 id="game-status">Live Game</h2>
            <p class="hint" id="question-count">Waiting for the first question</p>
          </div>
          <div class="timer" id="timer">--</div>
        </div>

        <div id="question-panel" class="question-panel hidden">
          <h3 id="question-prompt"></h3>
          <div id="choice-list" class="choice-list host-choices"></div>
        </div>

        <div id="leaderboard-panel" class="leaderboard-panel hidden">
          <h2>Leaderboard</h2>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
        </div>

        <div id="final-panel" class="final-panel hidden">
          <div class="final-title" style="display:none"></div>
          <h2>Final Podium</h2>
          <div id="podium" class="podium"></div>
          <p id="session-summary" class="hint"></p>
          <div class="controls" style="margin-top:20px">
            <button type="button" class="btn" id="export-results-btn">⬇ Export Results CSV</button>
            <a class="btn btn-warn" th:href="@{/dashboard}">← Return to Dashboard</a>
          </div>
        </div>
      </section>

      <div id="log" class="log"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script th:inline="javascript">
      window.LOBBY_CODE = /*[[${code}]]*/ '';
      window.LOBBY_ROLE = 'host';
    </script>
    <script th:src="@{/js/game.js}"></script>
    <script th:src="@{/js/lobby.js}"></script>
    <script>
      // Keep roster badge in sync with player count
      const obs = new MutationObserver(() => {
        const count = document.querySelectorAll('#roster li:not(.empty)').length;
        const badge = document.getElementById('roster-badge');
        if (badge) badge.textContent = count + ' joined';
      });
      obs.observe(document.getElementById('roster'), { childList: true });
    </script>
  </body>
</html>
