<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Quiz Manually</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow rounded">
        <h2>Create a New Quiz</h2>
        <form th:action="@{/manual/create}" method="post">
            <div class="mb-3">
                <label class="form-label">Quiz Title</label>
                <input type="text" name="title" class="form-control" required placeholder="e.g., Biology 101">
            </div>

            <div id="questions-container">
                <div class="card mb-3 p-3 border-primary">
                    <h5>Question 1</h5>
                    <input type="text" name="questions[0].prompt" class="form-control mb-2" placeholder="Question prompt" required>
                    <div class="row g-2">
                        <div class="col-6"><input type="text" name="questions[0].a" class="form-control" placeholder="Option A" required></div>
                        <div class="col-6"><input type="text" name="questions[0].b" class="form-control" placeholder="Option B" required></div>
                        <div class="col-6"><input type="text" name="questions[0].c" class="form-control" placeholder="Option C" required></div>
                        <div class="col-6"><input type="text" name="questions[0].d" class="form-control" placeholder="Option D" required></div>
                    </div>
                    <label class="mt-2">Correct Answer:</label>
                    <select name="questions[0].correct" class="form-select w-25">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>
            </div>

            <button type="button" class="btn btn-secondary" onclick="addQuestion()">+ Add Another Question</button>
            <hr>
            <button type="submit" class="btn btn-success">Save and Finish</button>
        </form>
    </div>

    <script>
        let questionCount = 1;
        function addQuestion() {
            const container = document.getElementById('questions-container');
            const div = document.createElement('div');
            div.className = 'card mb-3 p-3 border-primary';
            div.innerHTML = `
                <h5>Question ${questionCount + 1}</h5>
                <input type="text" name="questions[${questionCount}].prompt" class="form-control mb-2" placeholder="Question prompt" required>
                <div class="row g-2">
                    <div class="col-6"><input type="text" name="questions[${questionCount}].a" class="form-control" placeholder="Option A" required></div>
                    <div class="col-6"><input type="text" name="questions[${questionCount}].b" class="form-control" placeholder="Option B" required></div>
                    <div class="col-6"><input type="text" name="questions[${questionCount}].c" class="form-control" placeholder="Option C" required></div>
                    <div class="col-6"><input type="text" name="questions[${questionCount}].d" class="form-control" placeholder="Option D" required></div>
                </div>
                <label class="mt-2">Correct Answer:</label>
                <select name="questions[${questionCount}].correct" class="form-select w-25">
                    <option value="A">A</option> <option value="B">B</option>
                    <option value="C">C</option> <option value="D">D</option>
                </select>
            `;
            container.appendChild(div);
            questionCount++;
        }
    </script>
</body>
</html>
