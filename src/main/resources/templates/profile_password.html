<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Change Password</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 460px; margin: 48px auto; padding: 0 16px; }
        h1 { font-size: 22px; font-weight: 500; margin-bottom: 24px; }
        .card { background: #fff; border-radius: 10px; padding: 28px;
                border: 1px solid #e0e0e0; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 14px; }
        label:first-of-type { margin-top: 0; }
        input[type=password] { width: 100%; padding: 9px 12px; border: 1px solid #ccc;
                               border-radius: 6px; font-size: 14px; font-family: inherit; }
        .btn { display: inline-block; padding: 9px 22px; border-radius: 6px; font-size: 14px;
               font-weight: 500; cursor: pointer; border: none; margin-top: 18px; }
        .btn-primary { background: #4f46e5; color: #fff; }
        .btn-primary:hover { background: #4338ca; }
        .alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .hint { font-size: 12px; color: #999; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Change Password</h1>

    <div th:if="${pwError}" class="alert alert-error" th:text="${pwError}"></div>

    <div class="card">
        <form th:action="@{/profile/password}" method="post">
            <label for="oldPassword">Current password</label>
            <input type="password" id="oldPassword" name="oldPassword" required autocomplete="current-password"/>

            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" name="newPassword" required
                   minlength="8" autocomplete="new-password"/>
            <p class="hint">At least 8 characters.</p>

            <label for="confirmPassword">Confirm new password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password"/>

            <button type="submit" class="btn btn-primary">Update password</button>
        </form>
    </div>

    <br/>
    <a th:href="@{/profile}" style="font-size:13px;color:#666;">← Back to profile</a>
</div>
</body>
</html>
