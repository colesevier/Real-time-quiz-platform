server.port=8080

spring.datasource.url=${QUIZ_DB_URL}
spring.datasource.username=${QUIZ_DB_USER}
spring.datasource.password=${QUIZ_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.thymeleaf.cache=false

server.max-http-request-header-size=64KB

# Lobby / invite-code tunables
quiz.lobby.code-length=6
quiz.lobby.code-alphabet=NUMERIC
quiz.lobby.disconnect-grace-seconds=60
quiz.lobby.late-join=false
quiz.lobby.session-idle-sweep-minutes=120

ollama.base-url=http://host.docker.internal:11434
ollama.model=llama3.2
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
